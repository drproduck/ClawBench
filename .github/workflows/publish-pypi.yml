name: publish-pypi

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package-version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Read package version
        id: package-version
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="v${PACKAGE_VERSION}"
          if [[ "${RELEASE_TAG}" != "${expected}" ]]; then
            echo "::error title=Release tag mismatch::Expected ${expected}, got ${RELEASE_TAG}"
            exit 1
          fi

      - name: Build wheel and source distribution
        env:
          UV_FROZEN: "true"
        run: uv build

      - name: Check distribution metadata
        env:
          UV_FROZEN: "true"
        run: uvx twine check dist/*

      - name: Store distribution packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/clawbenchmark/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke test TestPyPI install
    needs:
      - build
      - publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install package from TestPyPI
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "clawbenchmark==${PACKAGE_VERSION}"

      - name: Verify console scripts
        run: |
          clawbench --help
          clawbench-run --help
          clawbench-batch --help

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs:
      - build
      - smoke-test-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/clawbenchmark/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
