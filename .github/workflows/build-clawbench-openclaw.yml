name: Build ClawBench OpenClaw Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Extra image tag to publish"
        required: true
        default: "openclaw-smoke"

permissions:
  contents: read
  packages: write

jobs:
  build-openclaw:
    runs-on: ubuntu-latest
    env:
      RUNTIME_CONTEXT: src/clawbench/runtime
      BASE_DOCKERFILE: src/clawbench/runtime/harnesses/base/Dockerfile.base
      OPENCLAW_DOCKERFILE: src/clawbench/runtime/harnesses/openclaw/Dockerfile.openclaw

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image name
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${owner_lc}/clawbench-openclaw" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f "$BASE_DOCKERFILE" \
            -t clawbench-base \
            -t clawbench-base:amd64 \
            "$RUNTIME_CONTEXT"

      - name: Build OpenClaw image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f "$OPENCLAW_DOCKERFILE" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ inputs.image_tag }}" \
            -t "$IMAGE:${{ github.sha }}" \
            "$RUNTIME_CONTEXT"

      - name: Push OpenClaw image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ inputs.image_tag }}"
          docker push "$IMAGE:${{ github.sha }}"

      - name: Print image references
        shell: bash
        run: |
          {
            echo "## Published images"
            echo
            echo "- \`${IMAGE}:latest\`"
            echo "- \`${IMAGE}:${{ inputs.image_tag }}\`"
            echo "- \`${IMAGE}:${{ github.sha }}\`"
            echo
            echo "Cluster/Pyxis form:"
            echo
            echo "\`\`\`bash"
            echo "srun --container-image=docker://${IMAGE}:${{ inputs.image_tag }} /entrypoint.sh"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
