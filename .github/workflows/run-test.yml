name: run-test

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/run-test.yml"
      - "src/clawbench/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/run-test.yml"
      - "src/clawbench/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  run-test:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run host-side pytest suite
        run: uv run --frozen pytest
